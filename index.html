    <div id="cesiumContainer"></div>

    <script type="module">
        // ========== KONFIGURASI DASAR ==========
        const terrainID = 2918417;  // ID terrain dari Cesium Ion

        // ID untuk 3 model berbeda
        const modelAssets = [  
        {//DTM Ortho
                id: 4969455,
                name: " ",
                description: `
                <h3 style="text-align:center">DEM Area Bumi Perkemahan</h3>
                <p style="text-align:justify">DEM yang digunakan merupakan kombinasi data DTM dan ortofoto di sekitar area Bumi Perkemahan dari hasil pemrosesan data LiDAR.</p>
            `,
                coords: [110.428200, -7.591200, 50],
        },
        ];

        

        // Ganti dengan token milik kamu sendiri dari Cesium Ion
        Cesium.Ion.defaultAccessToken =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3MGM0ZjU3My00YzRmLTRmNWYtYjYzMi0wZTM2NWE3MGMwYjQiLCJpZCI6NDQ3MTUwLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODIwMzA1MzB9.fIbf5WyLQhMmZTEBHEdakAI7iIe3-zZfb5_7o8I8ktU';

        // ========== INISIALISASI VIEWER ==========
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain(),
            baseLayerPicker: false
        });

        // ========== TAMBAHKAN SEMUA MODEL ==========
        const tilesets = [];

        for (const model of modelAssets) {
            
            Cesium.Cesium3DTileset.fromIonAssetId(model.id).then(tileset => {

                viewer.scene.primitives.add(tileset);
                // Simpan tileset sesuai ID untuk toggle
                window.loadedTiles[model.id] = tileset;
                tilesets.push({ tileset, ...model });

                // Default: orto aktif, polos mati
                if (model.id === 4163561) tileset.show = true;
                if (model.id === 4164395) tileset.show = false;


                // Tambah label
                
                viewer.entities.add({
                    name: model.name,
                    position: Cesium.Cartesian3.fromDegrees(...model.coords),
                    label: {
                        text: model.name,
                        font: "16px sans-serif",
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -20)
                    }
                });

                // Translasi
                tileset.readyPromise.then(() => {
                    if (model.offset) {
                        const translation = new Cesium.Cartesian3(
                            model.offset[0],
                            model.offset[1],
                            model.offset[2]
                        );
                        tileset.modelMatrix = Cesium.Matrix4.multiply(
                            tileset.modelMatrix,
                            Cesium.Matrix4.fromTranslation(translation),
                            new Cesium.Matrix4()
                        );
                    }
                });

            }).catch(err => {
                console.error("Gagal load model ID:", model.id, err);
            });

        }

        // ========== CAROUSEL FUNCTION ==========
        window.carouselIndex = {};

        window.moveCarousel = function(id, direction) {

            if (!window.carouselIndex[id]) {
                window.carouselIndex[id] = 0;
            }

            const track = document.getElementById("track-" + id);
            const totalItems = track.children.length;

            window.carouselIndex[id] += direction;

            if (window.carouselIndex[id] < 0) window.carouselIndex[id] = totalItems - 1;
            if (window.carouselIndex[id] >= totalItems) window.carouselIndex[id] = 0;

            track.style.transform = `translateX(-${window.carouselIndex[id] * 100}%)`;
        }



        // ========== ATUR POSISI KAMERA ==========
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(110.4275, -7.5950, 1100),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-25),
                roll: 0
            },
            duration: 3
        });


        // ========== TAMBAHKAN INTERAKSI KLIK ==========
        // SINGLE handler untuk popup & measure (klik kiri)
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

        // measure state
        let measureMode = false;
        let measurePoints = [];
        let activeLine = null;
        let distanceLabel = null;

        // tombol measure (jika kamu punya tombol measureBtn)
        const measureBtn = document.getElementById("measureBtn");
        if (measureBtn) {
            measureBtn.onclick = () => {
                measureMode = !measureMode;
                measurePoints = [];
                if (measureMode) {
                    alert("Mode pengukuran aktif. Klik dua titik pada objek 3D.");
                    if (activeLine) { viewer.entities.remove(activeLine); activeLine = null; }
                    if (distanceLabel) { viewer.entities.remove(distanceLabel); distanceLabel = null; }
                }
            };
        }

        // Handler tunggal
        handler.setInputAction((movement) => {
            // 1) Jika measure mode aktif -> proses measurement
            if (measureMode) {
                const pos = viewer.scene.pickPosition(movement.position);
                if (!Cesium.defined(pos)) {
                    console.log("Tidak dapat pick posisi (tidak ada depth). Pastikan kamera tidak terlalu jauh dan tileset memakai depth.");
                    return;
                }

                measurePoints.push(pos);

                if (measurePoints.length === 2) {
                    // Buat/bersihkan sebelumnya
                    if (activeLine) { viewer.entities.remove(activeLine); activeLine = null; }
                    if (distanceLabel) { viewer.entities.remove(distanceLabel); distanceLabel = null; }

                    // Buat garis
                    activeLine = viewer.entities.add({
                        polyline: {
                            positions: measurePoints,
                            width: 4,
                            material: Cesium.Color.YELLOW
                        }
                    });

                    // Hitung jarak 3D
                    const d = Cesium.Cartesian3.distance(measurePoints[0], measurePoints[1]);

                    // Titik tengah (midpoint)
                    const mid = Cesium.Cartesian3.midpoint(measurePoints[0], measurePoints[1], new Cesium.Cartesian3());

                    // Tambah label pada midpoint
                    distanceLabel = viewer.entities.add({
                        position: mid,
                        label: {
                            text: d.toFixed(2) + " m",
                            font: "18px sans-serif",
                            fillColor: Cesium.Color.WHITE,
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 4,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            pixelOffset: new Cesium.Cartesian2(0, -20)
                        }
                    });

                    // reset measure mode
                    measureMode = false;
                    measurePoints = [];
                }
                return; // penting: stop di sini kalau measure
            }

            


            // 2) Jika bukan measure -> proses pick untuk popup model
            if (measureMode) return; // kalau sedang ukur, abaikan popup

            const pickedObject = viewer.scene.pick(movement.position);
            if (!pickedObject) return;

            // Karena primitive = tileset yang diklik
            const p = pickedObject.primitive;

            // Cari tileset yang cocok
            const clickedTileset = tilesets.find(t =>
                t.tileset === p || t.tileset === p._root
            );

            if (clickedTileset) {

                // Hapus sisa garis dan label pengukuran
                if (activeLine) { viewer.entities.remove(activeLine); activeLine = null; }
                if (distanceLabel) { viewer.entities.remove(distanceLabel); distanceLabel = null; }
                
                viewer.selectedEntity = new Cesium.Entity({
                    name: clickedTileset.name,
                    description: clickedTileset.description
                });
            }



        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);


        // =============================
        // LAYER CONTROL CHECKBOX
        // =============================

        // Pastikan objek tileset sudah disimpan
        window.loadedTiles = window.loadedTiles || {};

        // Orto
        document.getElementById("chkOrto").addEventListener("change", () => {
            const orto = window.loadedTiles[4163561];
            const polos = window.loadedTiles[4164395];

            if (!orto || !polos) return;

            if (document.getElementById("chkOrto").checked) {
                // Aktifkan Orto, matikan Polos
                orto.show = true;
                polos.show = false;

                document.getElementById("chkPolos").checked = false;
            } else {
                // Jika orto dimatikan → polos tetap mati
                orto.show = false;
            }
        });

        // Polos
        document.getElementById("chkPolos").addEventListener("change", () => {
            const orto = window.loadedTiles[4163561];
            const polos = window.loadedTiles[4164395];

            if (!orto || !polos) return;

            if (document.getElementById("chkPolos").checked) {
                // Aktifkan Polos, matikan Orto
                polos.show = true;
                orto.show = false;

                document.getElementById("chkOrto").checked = false;
            } else {
                // Jika polos dimatikan → orto tetap mati
                polos.show = false;
            }
        });

        // ======================
        // COLLAPSIBLE LAYER BOX
        // ======================

        const layerTitle = document.getElementById("layerTitle");
        const layerOptions = document.getElementById("layerOptions");
        const layerBox = document.getElementById("layerBox");

        layerTitle.addEventListener("click", () => {
            if (layerOptions.style.display === "none") {
                layerOptions.style.display = "block";
                layerTitle.innerHTML = "DTM Basemap ▲";
            } else {
                layerOptions.style.display = "none";
                layerTitle.innerHTML = "DTM Basemap ▼";
            }
        });

    </script>
